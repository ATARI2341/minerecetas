<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Solicitud de Diseños</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Sistema de Solicitud de Diseños</h1>
            <div class="theme-selector">
                <label>Tema:</label>
                <select id="themeSelect">
                    <option value="light">☀️ Claro</option>
                    <option value="dark">🌙 Oscuro</option>
                    <option value="custom">🎨 Personalizado</option>
                </select>
            </div>
        </header>

        <div class="dashboard">
            <!-- Formulario de nueva solicitud -->
            <section class="form-section">
                <h2>📝 Nueva Solicitud</h2>
                <form id="designRequestForm">
                    <input type="text" id="clientName" placeholder="Cliente" required>
                    <input type="text" id="projectName" placeholder="Proyecto" required>
                    
                    <div class="design-type-group">
                        <label for="designType">Tipo de diseño:</label>
                        <select id="designType" required>
                            <option value="">Seleccionar tipo</option>
                        </select>
                        <button type="button" id="addDesignTypeBtn" class="small-btn">➕ Agregar tipo</button>
                    </div>
                    
                    <textarea id="description" placeholder="Descripción detallada..." rows="3"></textarea>
                    
                    <div class="date-group">
                        <label for="deliveryDate">📅 Fecha límite de entrega:</label>
                        <input type="date" id="deliveryDate" required>
                        <small id="dateWarning" class="date-warning"></small>
                    </div>
                    
                    <div class="priority">
                        <label>Prioridad:</label>
                        <select id="priority">
                            <option value="baja">🟢 Baja</option>
                            <option value="media">🟡 Media</option>
                            <option value="alta">🔴 Alta</option>
                        </select>
                    </div>
                    <button type="submit">📤 Enviar Solicitud</button>
                </form>
            </section>

            <!-- Listado de solicitudes con control -->
            <section class="requests-section">
                <h2>📋 Solicitudes <span id="requestCount">(0)</span></h2>
                <div class="filters">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar...">
                    <select id="statusFilter">
                        <option value="todas">📌 Todas</option>
                        <option value="pendiente">⏳ Pendiente</option>
                        <option value="enproceso">🔄 En proceso</option>
                        <option value="completado">✅ Completado</option>
                    </select>
                    <select id="deadlineFilter">
                        <option value="todas">📅 Todas las fechas</option>
                        <option value="urgente">⚠️ Urgentes (menos de 3 días)</option>
                        <option value="proximo">🟡 Próximas (3-7 días)</option>
                        <option value="normal">🟢 Normal (más de 7 días)</option>
                        <option value="vencidas">🔴 Vencidas</option>
                    </select>
                </div>
                <div id="requestsList" class="requests-list"></div>
            </section>
        </div>
    </div>

    <!-- Modal para agregar nuevo tipo de diseño -->
    <div id="designTypeModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Agregar nuevo tipo de diseño</h3>
            <input type="text" id="newDesignType" placeholder="Ej: Ilustración, UI/UX, 3D..." autocomplete="off">
            <select id="newDesignTypeIcon">
                <option value="🎨">🎨 Arte</option>
                <option value="🖌️">🖌️ Ilustración</option>
                <option value="📱">📱 App</option>
                <option value="💻">💻 Web</option>
                <option value="📊">📊 Infografía</option>
                <option value="🎬">🎬 Video</option>
                <option value="📦">📦 3D</option>
                <option value="✏️">✏️ Dibujo</option>
            </select>
            <button id="saveDesignTypeBtn">Guardar tipo</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
